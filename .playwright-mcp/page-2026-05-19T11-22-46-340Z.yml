              - text: Bosch - Lavavajillas Integrable, Serie 4, 60 cm. de ancho, 14 servicios, 3ª bandeja, Motor EcoSilence, Programa Rápido, Blanco, SMI4ECS28E [Clase de eficiencia energética A]
              - text: Gracias a la eficiencia energética A de este lavavajillas de Bosch, te permite consumir menos energía y agua sin comprometer los resultados de limpieza.
              - text: Podrás utilizar la App Home Connect, para gestionar y personalizar el funcionamiento de tu lavavajillas Bosch de forma remota. Además, puedes descargar programas adicionales y recibir diagnósticos para un mejor rendimiento.
              - text: Este lavavajillas te brinda la flexibilidad de lavar una gran cantidad de vajilla en una sola carga, hasta 14 servicios. Además, gracias al motor EcoSilence, funciona de manera silenciosa, proporcionándote un entorno tranquilo en tu cocina.
              - text: Con la 3ª bandeja VarioDrawer, las cestas Flex 2/2 y el RackMatic, este lavavajillas integrable ofrece una distribución flexible del espacio y opciones prácticas de carga.
              - text: Las dimensiones del lavavajillas son de 81,5 x 59,8 x 57,3 centímetros (alto x ancho x fondo).
