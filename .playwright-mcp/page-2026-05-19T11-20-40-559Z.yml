                  - generic [ref=e986]: expand-more
                - generic [ref=e989]:
                  - paragraph [ref=e990]: Efectivamente, Amazon pone a tu disposición la posibilidad de fraccionar el pago mediante su programa Compra ahora y paga más tarde, gestionado por Cofidis España, con alternativas pensadas para adaptarse a distintos presupuestos.
                  - list [ref=e991]:
                    - listitem [ref=e992]: "Paga en 4: diseñado para importes de entre 60€ y 1.000€, reparte el coste en 4 plazos distribuidos a lo largo de 90 días, con una aprobación prácticamente instantánea."
                    - listitem [ref=e993]: "Credit Line: orientado a pedidos de 45€ a 3.000€, permite elegir un calendario de devolución de entre 3 y 30 meses, sujeto a la autorización del crédito."
                  - paragraph [ref=e994]: Ambas fórmulas cubren cualquier sección del catálogo, brindándote la libertad de elegir el ritmo de pago que mejor encaje contigo y materializar tus compras pendientes sin agobios financieros.
