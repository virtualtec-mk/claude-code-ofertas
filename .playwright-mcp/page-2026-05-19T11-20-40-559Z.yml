            - generic [ref=e868]:
              - heading "Descubre cómo canjear un código promocional Amazon" [level=2] [ref=e869]
              - generic [ref=e871]:
                - text: "La plataforma ya de por sí ofrece precios muy competitivos, pero puedes arañar un ahorro adicional canjeando un cupón. Sigue estos pasos para hacerlo:"
                - list [ref=e872]:
                  - listitem [ref=e873]: "Revisa el cupón: consulta las promociones disponibles y asegúrate de que las condiciones encajan con los artículos que tienes en mente."
                  - listitem [ref=e874]: "Entra en tu perfil: inicia sesión en Amazon o, si aún no dispones de cuenta, regístrate previamente; es imprescindible para aplicar cualquier código y acceder al resto de ventajas."
                  - listitem [ref=e875]: "Añade los artículos a la cesta: mete los productos compatibles con la promoción, prestando atención a las restricciones de cada código, ya que algunos están limitados a referencias concretas."
                  - listitem [ref=e876]: "Pega el código: dentro de la pantalla de pago, localiza el apartado \"Tarjetas regalo y cheques promocionales\" e introduce ahí tu cupón."
                  - listitem [ref=e877]: "Verifica la rebaja: antes de confirmar el pedido, comprueba que el descuento aparece reflejado en el resumen y cierra la compra con el precio ya reducido."
          - generic [ref=e879]:
            - img "Pásate a Primer y descubre las ventajas" [ref=e881]
            - generic [ref=e882]:
              - heading "Pásate a Primer y descubre las ventajas" [level=2] [ref=e883]
              - generic [ref=e885]:
                - text: "En Chollometro te mostramos cómo ahorrar en Amazon aprovechando promociones y ventajas exclusivas. Con Amazon Prime, tu experiencia de compra mejora aún más: puedes probarlo gratis durante 30 días y, después, elegir entre 4,99€ al mes o 49,90 € al año, opción que te permite ahorrar alrededor de 10€ frente al pago mensual."
                - text: La suscripción incluye entregas rápidas sin coste extra, acceso a contenido de entretenimiento y ofertas exclusivas para miembros Prime. Combinando estas ventajas con los descuentos que recopilamos en Chollometro, verás cómo tu ahorro crece en cada pedido.
